      <div class="post-content">
        <p>被动输入是廉价的。听课、看视频、读文章，感觉自己学了很多。但一动手写，就发现脑子里全是窟窿。</p>
        <p>输出能暴露你的盲区。你以为你懂了，但说不出来、写不清楚，说明根本没懂透。</p>
        <p>所以我现在反过来：先设定一个输出目标，再去补输入。要写一篇技术文章，就去读源码；要做一个产品，就去学设计。</p>
        <p>输入是燃料，输出是引擎。没有引擎，燃料再多也只是堆在那里。</p>
      </div>
