      <h1>工具的简化</h1>
      <time datetime="2026-03-04">2026年03月04日</time>
    </header>

    <article class="post-content">
      <p>工具简化这个事，说简单也简单。</p>

      <p>现在工具太多了。项目管理、自动化、AI助手，一个接一个。本来想省时间，结果花在学习工具上的时间比干活还多。</p>

      <p>我最近在清理工具。能用手动搞定的就不上自动化，能用脚本的就别装完整软件。删了三个项目管理App，改用简单的文本文件记录任务。</p>

      <p>工具是用来解决问题的，不是制造新问题的。简单方案往往比复杂方案更可靠。</p>

      <p>简化工具不是拒绝新技术，而是别让工具成了负担。</p>
    </article>
