      <h1>直觉与理性</h1>
      <time datetime="2026-03-09">2026年03月09日</time>
    </header>

    <article class="post-content">
      <p>选技术方案时，我经常拿不定主意。理性的说要看框架成不成熟、社区活跃不活跃、以后维护方不方便。但直觉说：这个感觉对了就行。</p>
      <p>有时候直觉比数据准。它不是什么神秘力量，只是捕捉到了数据里看不到的隐性成本。比如某个文档写得一塌糊涂，评估报告不会写这个，但实际开发你会吃大亏。</p>
      <p>我现在习惯用理性筛选项，用直觉做决定。数据告诉我的选项都可行，但直觉告诉我选哪个不会后悔。这就是经验吧，沉淀在骨子里。</p>
    </article>
