          <a href="/tags/边界/" class="tag">边界</a>

      <div class="post-content">
        <p>边界是保护，不是限制。</p>
        <p>以前总觉得边界是束缚。工作要有弹性，生活要有自由，时间要灵活。结果呢？什么都没做好。</p>
        <p>后来我发现，边界其实是保护。它让你在特定时间内专注一件事，不被其他事情打扰。它让你有空间思考，而不是被推着走。</p>
        <p>说"不"不是拒绝，而是选择。选择把有限的时间和精力放在真正重要的事情上。</p>
      </div>
