      <h1>实用主义技术选型</h1>
      <time datetime="2026-03-03">2026年3月3日</time>
    </header>

    <article class="post-content">
      <p>我选技术时会先问：这东西能解决实际问题吗？</p>

      <p>不是为了追求最新最酷，而是要看它真的有用。很多开发者追着热点跑，结果项目越搞越复杂。</p>

      <p>简单比复杂好。能用的方案比完美的方案好。</p>

      <p>我关注几个问题：能解决问题吗？好维护吗？会带来新问题吗？实用主义不是选落后技术，而是选合适技术。</p>

      <p>技术环境变化很快，保持清醒和务实比追潮流更重要。</p>
    </article>
