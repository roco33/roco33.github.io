      <div class="post-content">
        <p>复杂是容易的，简单才是难的。</p>
        <p>谁都能往系统里加功能、往文章里堆字数、往产品里塞按钮。但要把复杂的东西变简单，需要真正理解本质。</p>
        <p>我见过太多"因为可以所以加上"的东西。但好的设计是"因为不需要所以去掉"。</p>
        <p>能用一句话说清楚的，不要用两句话。能用一个按钮解决的，不要给用户三个选项。</p>
        <p>简单不是简陋，是提炼后的精华。</p>
      </div>
